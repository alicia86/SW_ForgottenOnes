---
layout: default
---
<div class="log-wrapper">
  <aside id="toc-sidebar" class="toc-sidebar">
    <div class="toc-header">
      <span style="color: var(--sw-blue); letter-spacing: 2px;">DATAPAD INDEX</span>
      <button class="toc-close" style="color: var(--sw-blue);">[ X ]</button>
    </div>
    <div class="toc-content">
      {{ content | toc }}
    </div>
  </aside>

  <article class="log-content">
    <button class="toc-open-btn">☰ OPEN INDEX</button>
    <div class="markdown-body">
       {{ content }}
    </div>
  </article>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const sidebar = document.getElementById('toc-sidebar');
        const openBtn = document.querySelector('.toc-open-btn');
        const closeBtn = document.querySelector('.toc-close');

        function toggleTOC() {
            sidebar.classList.toggle('active');
            console.log("Sidebar status: ", sidebar.classList.contains('active'));
        }

        // Assigning the clicks via JS instead of inline HTML for better reliability
        if (openBtn) openBtn.onclick = toggleTOC;
        if (closeBtn) closeBtn.onclick = toggleTOC;
    });
</script>
