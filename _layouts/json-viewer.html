<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | Star Wars: Forgotten Ones</title>
    <style>
        :root {
            --gh-bg: #0d1117;
            --gh-border: #30363d;
            --gh-text: #c9d1d9;
            --sw-yellow: #d29922;
            --sw-blue: #58a6ff;
        }

        body {
            background-color: var(--gh-bg);
            color: var(--gh-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #controls {
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
            padding: 15px;
            background: #161b22;
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            text-align: center;
        }

        #log-container {
            width: 100%;
            max-width: 900px;
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            background: var(--gh-bg);
            padding: 20px 0;
        }

        .message-group {
            display: flex;
            padding: 8px 20px;
            border-bottom: 1px solid rgba(48, 54, 61, 0.3);
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 4px;
            margin-right: 15px;
            flex-shrink: 0;
            border: 1px solid var(--gh-border);
        }

        .msg-body { flex-grow: 1; }

        .msg-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 4px;
        }

        .username {
            color: var(--sw-blue);
            font-weight: 600;
            font-size: 1rem;
        }

        .timestamp {
            color: #8b949e;
            font-size: 0.75rem;
        }

        .msg-content {
            line-height: 1.5;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        /* --- DISCORD MARKDOWN STYLES --- */
        .msg-content strong { color: #fff; }
        .msg-content i { font-style: italic; color: #8b949e; }
        
        /* Storyteller Gold Style (***text***) */
        .st-gold {
            color: var(--sw-yellow);
            font-style: italic;
            font-weight: bold;
            display: block;
            margin: 10px 0;
            text-align: center;
            font-size: 1.1rem;
        }

        .attachment-img {
            max-width: 100%;
            border-radius: 4px;
            margin-top: 10px;
            border: 1px solid var(--gh-border);
        }

        .emoji {
            height: 1.2rem;
            vertical-align: middle;
            margin: 0 2px;
        }
    </style>
</head>
<body>

    <div id="controls">
        <label>Current Datapad Entry: </label>
        <select id="chapter-picker" onchange="loadChapter(this.value)">
            </select>
    </div>

    <article id="log-container">
        <div id="viewer-output">Accessing encrypted archives...</div>
    </article>

    <script>
        async function loadChapter(jsonFile) {
            const output = document.getElementById('viewer-output');
            output.innerHTML = "<em>Decrypting stream...</em>";

            try {
                const response = await fetch(`{{ site.baseurl }}/Chapter_Logs/JSON/${jsonFile}`);
                const messages = await response.json();
                const folderBase = jsonFile.replace('.json', '');
                
                output.innerHTML = ""; // Clear loader

                messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'message-group';

                    // Avatar Path: Chapter_Logs/avatars/[ID]/[HASH].png
                    const avatarUrl = msg.author.avatar 
                        ? `{{ site.baseurl }}/Chapter_Logs/avatars/${msg.author.id}/${msg.author.avatar}.png`
                        : `{{ site.baseurl }}/Chapter_Logs/avatars/default.png`;

                    div.innerHTML = `
                        <img src="${avatarUrl}" class="avatar" onerror="this.src='{{ site.baseurl }}/Chapter_Logs/avatars/default.png'">
                        <div class="msg-body">
                            <div class="msg-header">
                                <span class="username">${msg.author.username}</span>
                                <span class="timestamp">${new Date(msg.timestamp).toLocaleString()}</span>
                            </div>
                            <div class="msg-content">${parseMarkdown(msg.content)}</div>
                            <div class="msg-attachments">${renderAttachments(msg.attachments, folderBase)}</div>
                        </div>
                    `;
                    output.appendChild(div);
                });
            } catch (err) {
                output.innerHTML = `<b style="color:red">ERROR: Signal Lost. ${err.message}</b>`;
            }
        }

        function parseMarkdown(text) {
            if (!text) return "";
            return text
                // Storyteller Gold (***)
                .replace(/\*\*\*(.*?)\*\*\*/g, '<span class="st-gold">$1</span>')
                // Bold (**)
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                // Italics (*)
                .replace(/\*(.*?)\*/g, '<i>$1</i>')
                // Custom Emojis (Discord format <:name:id>)
                .replace(/<:(.*?):(\d+)>/g, (match, name, id) => {
                    return `<img src="{{ site.baseurl }}/Chapter_Logs/emojis/${name}_${id}.png" class="emoji" alt="${name}">`;
                });
        }

        function renderAttachments(attachments, folder) {
            if (!attachments || attachments.length === 0) return "";
            return attachments.map(a => 
                `<img src="{{ site.baseurl }}/Chapter_Logs/media/${folder}/${a.filename}" class="attachment-img">`
            ).join('');
        }

        // Initialize with the picker's value (set by the sandbox page)
        window.onload = () => {
            const picker = document.getElementById('chapter-picker');
            if(picker.value) loadChapter(picker.value);
        };
    </script>
</body>
</html>
