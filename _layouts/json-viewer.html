<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | Star Wars: Forgotten Ones</title>    
    
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
    <style>       
        #controls {
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
            padding: 15px;
            background: #161b22;
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            text-align: center;
        }

        #log-container {
            width: 100%;
            max-width: 900px;
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            background: var(--gh-bg);
            padding: 20px 0;
        }

        .message-group {
            display: flex;
            padding: 8px 20px;
            border-bottom: 1px solid rgba(48, 54, 61, 0.3);
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 4px;
            margin-right: 15px;
            flex-shrink: 0;
            border: 1px solid var(--gh-border);
        }

        .msg-body { flex-grow: 1; }

        .msg-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 4px;
        }

        .username {
            color: var(--sw-blue);
            font-weight: 600;
            font-size: 1rem;
        }

        .msg-content {
            line-height: 1.5;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        /* --- DISCORD MARKDOWN STYLES --- */
        .msg-content strong { color: #fff; }
        .msg-content i { font-style: italic; color: #8b949e; }
        
        /* Storyteller Gold Style (***text***) */
        .st-gold {
            margin: 10px 0;
            font-size: 1.1rem;
        }

        .attachment-img {
            max-width: 100%;
            border-radius: 4px;
            margin-top: 10px;
            border: 1px solid var(--gh-border);
        }

        .emoji {
            height: 1.2rem;
            vertical-align: middle;
            margin: 0 2px;
        }
    </style>
</head>
<body>

    <div id="controls">
        <label>Current Datapad Entry: </label>
        <select id="chapter-picker" onchange="loadChapter(this.value)">
            </select>
    </div>

    <article id="log-container">
        <div id="viewer-output">Accessing encrypted archives...</div>
    </article>

    <script>
        async function loadChapter(jsonFile) {
            const output = document.getElementById('viewer-output');
            output.innerHTML = "<em>Decrypting stream...</em>";

            try {
                // Use relative_url filter for the fetch path
                const response = await fetch("{{ '/Chapter_Logs/JSON/' | relative_url }}" + jsonFile);
                const data = await response.json();
                
                // Discord Chat Exporter usually puts the array in data.messages
                const messages = data.messages || data; 
                const folderBase = jsonFile.replace('.json', '');
                
                output.innerHTML = ""; 

                messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'message-group';

                    // Use the correct JSON fields: msg.author.id and msg.author.avatar
                    const avatarUrl = (msg.author && msg.author.avatar) 
                        ? "{{ '/Chapter_Logs/avatars/' | relative_url }}" + msg.author.id + "/" + msg.author.avatar + ".png"
                        : "{{ '/Chapter_Logs/avatars/default.png' | relative_url }}";

                    div.innerHTML = `
                        <img src="${avatarUrl}" class="avatar" onerror="this.src='{{ '/Chapter_Logs/avatars/default.png' | relative_url }}'">
                        <div class="msg-body">
                            <div class="msg-header">
                                <span class="username">${msg.author.nickname || msg.author.name}</span>
                                <span class="timestamp">${new Date(msg.timestamp).toLocaleString()}</span>
                            </div>
                            <div class="msg-content">${parseMarkdown(msg.content)}</div>
                            <div class="msg-attachments">${renderAttachments(msg.attachments, folderBase)}</div>
                        </div>
                    `;
                    output.appendChild(div);
                });
            } catch (err) {
                console.error(err);
                output.innerHTML = `<b style="color:red">ERROR: Signal Lost. ${err.message}</b>`;
            }
        }

        function parseMarkdown(text) {
            if (!text) return "";
            return text
                .replace(/\*\*\*(.*?)\*\*\*/g, '<span class="st-gold">$1</span>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<i>$1</i>')
                .replace(/<:(.*?):(\d+)>/g, (match, name, id) => {
                    return `<img src="{{ '/Chapter_Logs/emojis/' | relative_url }}${name}_${id}.png" class="emoji" alt="${name}">`;
                });
        }

        function renderAttachments(attachments, folder) {
            if (!attachments || attachments.length === 0) return "";
            return attachments.map(a => 
                `<img src="{{ '/Chapter_Logs/media/' | relative_url }}${folder}/${a.fileName}" class="attachment-img">`
            ).join('');
        }

        // Initialize with the picker's value (set by the sandbox page)
        window.onload = () => {
            const picker = document.getElementById('chapter-picker');
            if(picker.value) loadChapter(picker.value);
        };
    </script>
</body>
</html>
