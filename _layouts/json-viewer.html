---
layout: default
---
<style>
    /* 1. CONTAINER & STICKY STABILIZATION */
    .log-container-json { 
        width: 100%; 
        max-width: 900px; 
        margin: 0 auto; 
        padding-top: 20px;
        /* REQUIRED: Sticky items fail if overflow is hidden here */
        overflow: visible !important; 
    }

    /* 2. SECONDARY STICKY BAR (Frequency Switcher) */
    .frequency-nav-bar { 
        position: -webkit-sticky;
        position: sticky; 
        top: var(--header-height); /* Pins flush under Frozen Nav */
        z-index: 4500; 
        background: var(--panel-bg);
        border-bottom: 1px solid var(--gh-border);
        padding: 12px 0;
        display: none; /* Controlled by JS buildFrequencyBar */
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    .freq-container {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
        padding: 0 15px;
    }

    .comms-status { 
        width: 100%; 
        padding-bottom: 8px; 
        font-size: 0.6rem; 
        color: var(--sw-yellow); 
        font-family: monospace; 
        text-transform: uppercase; 
        border-bottom: 1px solid rgba(255,255,255,0.05);
        margin-bottom: 5px;
    }

    /* 3. MESSAGE FEED STYLING */
    .message-group { 
        display: flex; 
        padding: 15px 10px; 
        border-bottom: 1px solid rgba(48, 54, 61, 0.2); 
        transition: background 0.3s; 
    }

    .avatar-container { 
        width: 42px; 
        height: 42px; 
        margin-right: 15px; 
        flex-shrink: 0; 
        background: #1c2128; 
        border-radius: 4px; 
        overflow: hidden; 
    }

    .avatar { 
        width: 100%; 
        height: 100%; 
        object-fit: cover; 
        opacity: 0; 
        transition: opacity 0.3s; 
    }

    .avatar.loaded { opacity: 1; }

    .msg-body { flex-grow: 1; min-width: 0; }
    .username { color: var(--sw-blue); font-weight: bold; margin-right: 10px; }

    /* 4. TRANSITIONS & HIGHLIGHTS */
    .channel-transition { 
        display: flex; align-items: center; justify-content: center; 
        margin: 40px 0 20px; padding: 15px; 
        background: rgba(88,166,255,0.05); border: 1px dashed var(--sw-blue); 
        color: var(--sw-blue); font-family: monospace; font-size: 0.75rem; 
        letter-spacing: 2px; text-transform: uppercase; cursor: pointer; 
    }

    .message-group:target, .highlight-flash { 
        background: rgba(210, 153, 34, 0.15) !important; 
        border-left: 3px solid var(--sw-yellow); 
    }

    /* 5. MOBILE OVERRIDES */
    @media (max-width: 600px) {
        .log-container-json { padding: 5px; }
        .username { font-size: 0.95rem; }
        .timestamp { font-size: 0.7rem; display: block; margin-top: 2px; }
        .frequency-nav-bar { top: var(--header-height); }
    }
</style>

<header class="frozen-nav">
    <div class="nav-inner">
        <a href="{{ '/archives' | relative_url }}" class="toc-open-btn" style="text-decoration: none;">⇠</a>
        
        <select id="chapter-picker" class="toc-open-btn" onchange="loadChapter(this.value)" style="background: #1c2128; flex-grow: 1; min-width: 0;">
            <option value="">-- LOADING DATAPAD --</option>
        </select>

        <button id="thread-toggle" class="toc-open-btn" onclick="toggleFrequencies()" style="display:none;">📡</button>
    </div>
</header>

<div id="frequency-selector" class="frequency-nav-bar">
    <div class="freq-container" id="freq-buttons-target"></div>
</div>

<div class="log-container-json">
    <div id="viewer-output">{{ content }}</div>
</div>

<script>
    let fullData = [];
    let channelMap = {}; 
    let mainChannelId = null;
    const DEFAULT_AVATAR = "{{ '/Chapter_Logs/avatars/default.png' | relative_url }}";

    /**
     * INITIALIZATION: Fetch the Master Manifest
     */
    async function init() {
        try {
            // Added a timestamp parameter to force the browser to fetch the freshest version
            const cacheBuster = `?v=${new Date().getTime()}`;
            const response = await fetch("{{ '/assets/log-manifest.json' | relative_url }}" + cacheBuster);
            
            if (!response.ok) throw new Error("Manifest sequence offline.");
            const manifest = await response.json();
            
            const picker = document.getElementById('chapter-picker');
            if (!picker) return;

            // Clear the "LOADING" message
            picker.innerHTML = ""; 

            manifest.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item.file;
                // FORCE: Use the title from the JSON manifest
                opt.textContent = item.title; 
                picker.appendChild(opt);
            });

            // Auto-load the first (latest) entry in the manifest if we haven't selected one
            if (manifest.length > 0 && !picker.value) {
                picker.value = manifest[0].file;
                loadChapter(manifest[0].file);
            }
        } catch (e) {
            console.error("Manifest Error:", e);
            document.getElementById('viewer-output').innerHTML = `<b style="color:red">COMMS ERROR: ${e.message}</b>`;
        }
    }

    /**
     * CHAPTER LOADING: Fetch individual JSON transmission
     */
    async function loadChapter(jsonFile) {
        if (!jsonFile) return;
        const output = document.getElementById('viewer-output');
        output.innerHTML = "<em>Decrypting Data Stream...</em>";

        try {
            const response = await fetch("{{ '/Chapter_Logs/JSON/' | relative_url }}" + jsonFile);
            const data = await response.json();
            
            // Convert to array
            fullData = Array.isArray(data) ? data : (data.messages || []);

            // --- FORCE CHRONOLOGICAL SORT ---
            // This ensures messages appear Oldest -> Newest regardless of export settings
            fullData.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            // Pre-scan for Thread Names and Main Channel ID
            channelMap = {};
            let parentCounts = {};
            fullData.forEach(m => {
                if (m.thread) {
                    channelMap[m.thread.id] = m.thread.name.toUpperCase();
                    if (m.thread.parent_id) {
                        parentCounts[m.thread.parent_id] = (parentCounts[m.thread.parent_id] || 0) + 1;
                    }
                }
            });

            mainChannelId = Object.keys(parentCounts).reduce((a, b) => parentCounts[a] > parentCounts[b] ? a : b, null);
            if (!mainChannelId && fullData.length > 0) mainChannelId = fullData[0].channel_id;

            buildFrequencyBar();
            renderFeed('all');
            window.scrollTo(0, 0);
        } catch (err) {
            output.innerHTML = `<b style="color:red">DATA CORRUPTION: ${err.message}</b>`;
        }
    }

    /**
     * FEED RENDERING: Handle Markdown, Avatars, and Shifting
     */
    function renderFeed(filterId) {
        const output = document.getElementById('viewer-output');
        output.innerHTML = "";
        let lastChannelId = null;

        document.querySelectorAll('.freq-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-id') === filterId);
        });

        const messages = filterId === 'all' ? fullData : fullData.filter(m => m.channel_id === filterId || (m.thread && m.thread.id === filterId));

        messages.forEach(msg => {
            const isThreadStarter = (msg.thread && msg.channel_id === mainChannelId);
            const actualChannel = isThreadStarter ? msg.thread.id : msg.channel_id;

            // Frequency Shift Marker
            if (filterId === 'all' && lastChannelId !== null && actualChannel !== lastChannelId && !isThreadStarter) {
                const shiftName = channelMap[actualChannel] || "PRIMARY FREQUENCY";
                const transition = document.createElement('div');
                transition.className = 'channel-transition';
                transition.innerHTML = `📡 FREQUENCY SHIFT >> ${shiftName}`;
                transition.onclick = () => renderFeed(actualChannel);
                output.appendChild(transition);
            }
            if (!isThreadStarter) lastChannelId = actualChannel;

            // Thread Creation Divider
            if (isThreadStarter) {
                const div = document.createElement('div');
                div.className = 'channel-transition';
                div.style.cssText = "background:rgba(210,153,34,0.05); border-color:var(--sw-yellow); color:var(--sw-yellow);";
                div.innerHTML = `📂 NEW ENCRYPTED CHANNEL: ${msg.thread.name} (OPEN)`;
                div.onclick = () => renderFeed(msg.thread.id);
                output.appendChild(div);
                return;
            }

            const group = document.createElement('div');
            group.className = 'message-group';
            group.id = `msg-${msg.id}`;

            let avatarPath = DEFAULT_AVATAR;
            if (msg.author && msg.author.id && msg.author.avatar) {
                avatarPath = `{{ '/Chapter_Logs/avatars/' | relative_url }}${msg.author.id}/${msg.author.avatar}.png`;
            }

            group.innerHTML = `
                <div class="avatar-container">
                    <img src="${DEFAULT_AVATAR}" data-src="${avatarPath}" class="avatar lazy-load">
                </div>
                <div class="msg-body">
                    <div class="msg-header">
                        <span class="username">${msg.author.nickname || msg.author.global_name || msg.author.username}</span>
                        <span class="timestamp">${new Date(msg.timestamp).toLocaleString()}</span>
                        <a href="#msg-${msg.id}" class="copy-link-icon" onclick="copyMsgLink(event, '${msg.id}')">🔗</a>
                    </div>
                    <div class="msg-content">${parseMarkdown(msg.content)}</div>
                </div>
            `;
            output.appendChild(group);
        });
        silentLoadAvatars();
    }

    /**
     * MARKDOWN PARSER: Custom Discord Formatting
     */
    function parseMarkdown(text) {
        if (!text) return "";
        let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

        return html
            .replace(/&lt;a?(:.*?:)(\d+)&gt;/g, (match, name, id) => {
                const cleanName = name.replace(/:/g, '');
                return `<img src="{{ '/Chapter_Logs/emojis/' | relative_url }}${cleanName}_${id}.png" class="emoji">`;
            })
            .replace(/\[(.*?)\]\(&lt;?(https?:\/\/[^\s&gt;]+)&gt;?\)/g, '<a href="$2" target="_blank" class="external-link">$1</a>')
            .replace(/https:\/\/discord\.com\/channels\/\d+\/(\d+)\/(\d+)/g, (match, chanId, msgId) => {
                const name = channelMap[chanId] || "LINK";
                const exists = fullData.some(m => m.id === msgId);
                return exists ? `<a href="javascript:void(0)" onclick="jumpToMessage('${msgId}','${chanId}')" class="internal-link">${name} > 🔗</a>` : match;
            })
            .replace(/&lt;#(\d+)&gt;/g, (match, id) => {
                const name = channelMap[id] || "Frequency";
                return `<a href="javascript:void(0)" onclick="renderFeed('${id}')" class="internal-link"># ${name}</a>`;
            })
            .replace(/^# (.*$)/gim, '<h1>$1</h1>')
            .replace(/^## (.*$)/gim, '<h2>$1</h2>')
            .replace(/^### (.*$)/gim, '<h3>$1</h3>')
            .replace(/^#### (.*$)/gim, '<h4>$1</h4>')
            .replace(/^##### (.*$)/gim, '<h5>$1</h5>')
            .replace(/^##### (.*$)/gim, '<h6>$1</h6>')
            .replace(/^-# (.*$)/gim, '<small class="subtext">$1</small>')
            .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><i>$1</strong></i>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<i>$1</i>')
            .replace(/\|\|(.*?)\|\|/g, '<span class="spoiler">$1</span>')
            .replace(/\n/g, '<br>');
    }

    /**
     * UI HELPERS
     */
    function toggleFrequencies() {
        const bar = document.getElementById('frequency-selector');
        const btn = document.getElementById('thread-toggle');
        const isHidden = (bar.style.display === 'none' || bar.style.display === '');
        bar.style.display = isHidden ? 'block' : 'none';
        btn.style.background = isHidden ? 'var(--sw-blue)' : '#1c2128';
        btn.style.color = isHidden ? 'white' : 'var(--sw-blue)';
    }

    function buildFrequencyBar() {
        const bar = document.getElementById('frequency-selector');
        const target = document.getElementById('freq-buttons-target');
        const toggleBtn = document.getElementById('thread-toggle');
        const uniqueChannels = [...new Set(fullData.map(m => m.channel_id))];
        
        if (uniqueChannels.length <= 1) { 
            bar.style.display = 'none'; toggleBtn.style.display = 'none'; return; 
        }
        
        toggleBtn.style.display = 'block';
        bar.style.display = window.innerWidth > 1000 ? 'block' : 'none';

        let html = `<div class="comms-status">📡 Encrypted Frequencies Detected:</div>`;
        html += `<button class="freq-btn active" data-id="all" onclick="renderFeed('all')">COMBINED FEED</button>`;
        uniqueChannels.forEach(id => {
            html += `<button class="freq-btn" data-id="${id}" onclick="renderFeed('${id}')">${channelMap[id] || "PRIMARY CHANNEL"}</button>`;
        });
        target.innerHTML = html;
    }

    function silentLoadAvatars() {
        document.querySelectorAll('.lazy-load').forEach(img => {
            const realSrc = img.getAttribute('data-src');
            const probe = new Image();
            probe.src = realSrc;
            probe.onload = () => { img.src = realSrc; img.classList.add('loaded'); };
            probe.onerror = () => { img.src = DEFAULT_AVATAR; img.classList.add('loaded'); };
        });
    }

    function jumpToMessage(msgId, chanId) {
        renderFeed('all'); 
        setTimeout(() => {
            const target = document.getElementById(`msg-${msgId}`);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                target.classList.add('highlight-flash');
                setTimeout(() => target.classList.remove('highlight-flash'), 2000);
            }
        }, 100);
    }

    function copyMsgLink(e, id) {
        e.preventDefault();
        const url = window.location.origin + window.location.pathname + "#msg-" + id;
        navigator.clipboard.writeText(url).then(() => {
            const el = document.getElementById("msg-" + id);
            el.classList.add('highlight-flash');
            setTimeout(() => el.classList.remove('highlight-flash'), 1000);
        });
    }

    // Fire it up
    document.addEventListener("DOMContentLoaded", init);
</script>
