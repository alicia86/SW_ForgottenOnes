<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | Star Wars: Forgotten Ones</title>    
    
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}">
    <style>
        #controls { padding: 20px; text-align: center; background: var(--panel-bg); border-bottom: 1px solid var(--gh-border); }
        #log-container { width: 100%; max-width: 900px; margin: 20px auto; background: var(--gh-bg); }
        .message-group { display: flex; padding: 10px 20px; border-bottom: 1px solid var(--gh-border); }
        .avatar { width: 42px; height: 42px; border-radius: 4px; margin-right: 15px; flex-shrink: 0; border: 1px solid var(--gh-border); }
        .msg-body { flex-grow: 1; }
        .username { color: var(--sw-blue); font-weight: 600; margin-right: 10px; }
        .timestamp { color: var(--text-muted); font-size: 0.8rem; }
        .msg-content { white-space: pre-wrap; margin-top: 5px; }
        .st-gold { color: var(--sw-yellow); font-style: italic; font-weight: bold; display: block; text-align: center; margin: 15px 0; }
    </style>
</head>
<body>

    <div id="controls">
        <label>Select Datapad Archive: </label>
        <select id="chapter-picker" onchange="loadChapter(this.value)">
            <option value="">-- Select an Entry --</option>
            {% assign json_files = site.static_files | where_exp: "file", "file.path contains 'Chapter_Logs/JSON/'" %}
            {% for file in json_files %}
                <option value="{{ file.name }}">{{ file.basename | replace: '_', ' ' }}</option>
            {% endfor %}
        </select>
    </div>

    <article id="log-container">
        <div id="viewer-output">Please select a transmission from the archives above.</div>
    </article>

    <script>
        async function loadChapter(jsonFile) {
            if (!jsonFile) return;
            const output = document.getElementById('viewer-output');
            output.innerHTML = "<em>Establishing secure link...</em>";

            try {
                const response = await fetch("{{ '/Chapter_Logs/JSON/' | relative_url }}" + jsonFile);
                if (!response.ok) throw new Error(`Signal Interrupted (HTTP ${response.status})`);
                
                const data = await response.json();
                
                // FIX: Support both array-only JSON and object-wrapped JSON
                const messages = Array.isArray(data) ? data : (data.messages || []);
                
                if (messages.length === 0) {
                    output.innerHTML = "Archive is empty or corrupted.";
                    return;
                }

                const folderBase = jsonFile.replace('.json', '');
                output.innerHTML = ""; 

                messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'message-group';

                    const avatarUrl = (msg.author && msg.author.avatar) 
                        ? "{{ '/Chapter_Logs/avatars/' | relative_url }}" + msg.author.id + "/" + msg.author.avatar + ".png"
                        : "{{ '/Chapter_Logs/avatars/default.png' | relative_url }}";

                    // Handle different possible name fields in Discord JSON
                    const displayName = msg.author.nickname || msg.author.global_name || msg.author.username || "Unknown Entity";

                    div.innerHTML = `
                        <img src="${avatarUrl}" class="avatar" onerror="this.src='{{ '/Chapter_Logs/avatars/default.png' | relative_url }}'">
                        <div class="msg-body">
                            <div class="msg-header">
                                <span class="username">${displayName}</span>
                                <span class="timestamp">${new Date(msg.timestamp).toLocaleString()}</span>
                            </div>
                            <div class="msg-content">${parseMarkdown(msg.content)}</div>
                            <div class="msg-attachments">${renderAttachments(msg.attachments, folderBase)}</div>
                        </div>
                    `;
                    output.appendChild(div);
                });
            } catch (err) {
                console.error("Datapad Error:", err);
                output.innerHTML = `<b style="color:#f85149">CONNECTION FAILED: ${err.message}</b>`;
            }
        }

        function parseMarkdown(text) {
            if (!text) return "";
            return text
                .replace(/\*\*\*(.*?)\*\*\*/g, '<span class="st-gold">$1</span>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<i>$1</i>')
                .replace(/\|\|(.*?)\|\|/g, '<span class="spoiler">$1</span>') // Added spoilers
                .replace(/<:(.*?):(\d+)>/g, (match, name, id) => {
                    return `<img src="{{ '/Chapter_Logs/emojis/' | relative_url }}${name}_${id}.png" style="height:1.2em; vertical-align:middle;">`;
                });
        }

        function renderAttachments(attachments, folder) {
            if (!attachments || attachments.length === 0) return "";
            return attachments.map(a => 
                `<img src="{{ '/Chapter_Logs/media/' | relative_url }}${folder}/${a.fileName || a.filename}" class="attachment-img">`
            ).join('');
        }
    </script>
</body>
</html>
