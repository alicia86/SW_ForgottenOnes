<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | Star Wars: Forgotten Ones</title>    
    
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}">
    <style>
        #controls { padding: 20px; text-align: center; background: var(--panel-bg); border-bottom: 1px solid var(--gh-border); }
        #log-container { width: 100%; max-width: 900px; margin: 20px auto; background: var(--gh-bg); }
        .message-group { display: flex; padding: 10px 20px; border-bottom: 1px solid var(--gh-border); }
        .avatar { width: 42px; height: 42px; border-radius: 4px; margin-right: 15px; flex-shrink: 0; border: 1px solid var(--gh-border); }
        .msg-body { flex-grow: 1; }
        .username { color: var(--sw-blue); font-weight: 600; margin-right: 10px; }
        .timestamp { color: var(--text-muted); font-size: 0.8rem; }
        .msg-content { white-space: pre-wrap; margin-top: 5px; }
        .st-gold { color: var(--sw-yellow); font-style: italic; font-weight: bold; display: block; text-align: center; margin: 15px 0; }
    </style>
</head>
<body>

    <div id="controls">
        <div class="control-group">
            <label>MISSION ARCHIVE:</label>
            <select id="chapter-picker" onchange="loadChapter(this.value)">
                </select>
        </div>
        
        <div id="frequency-nav" class="frequency-bar"></div>
    </div>

    <article id="log-container">
        <div id="scene-index" class="scene-list"></div>
        <div id="viewer-output"></div>
    </article>

    <script>
        let currentLogData = []; // Store the full log in memory

        async function loadChapter(jsonFile) {
            if (!jsonFile) return;
            const output = document.getElementById('viewer-output');
            const freqNav = document.getElementById('frequency-nav');
            output.innerHTML = "<em>Opening Comms Channel...</em>";

            try {
                const response = await fetch("{{ '/Chapter_Logs/JSON/' | relative_url }}" + jsonFile);
                const data = await response.json();
                currentLogData = Array.isArray(data) ? data : (data.messages || []);
                
                // 1. Identify unique frequencies (threads/channels)
                setupFrequencySwitcher(currentLogData);
                
                // 2. Initial Render (Show All)
                renderMessages(currentLogData);

            } catch (err) {
                output.innerHTML = `<b style="color:red">COMMS ERROR: ${err.message}</b>`;
            }
        }
        function setupFrequencySwitcher(messages) {
            const freqNav = document.getElementById('frequency-nav');
            const channels = [...new Set(messages.map(m => m.channel_id))];
            
            let navHtml = `<button class="freq-btn active" onclick="filterFrequency('all')">MAIN FEED</button>`;
            
            channels.forEach(id => {
                // Try to find a friendly name (Optional: map IDs to names)
                const label = (id === "1463269257151254540") ? "BRIDGE" : `SEC-FREQ: ${id.slice(-4)}`;
                navHtml += `<button class="freq-btn" onclick="filterFrequency('${id}')">${label}</button>`;
            });
            
            freqNav.innerHTML = navHtml;
        }

        function filterFrequency(channelId) {
            // Toggle active button style
            document.querySelectorAll('.freq-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (channelId === 'all') {
                renderMessages(currentLogData);
            } else {
                const filtered = currentLogData.filter(m => m.channel_id === channelId);
                renderMessages(filtered);
            }
        }

        function renderMessages(messages) {
            const output = document.getElementById('viewer-output');
            output.innerHTML = "";
            
            messages.forEach(msg => {
                // SCENE DETECTION: If content is just "---", render as a Scene Divider
                if (msg.content === "---" || msg.content === "--- ") {
                    const divider = document.createElement('div');
                    divider.className = 'scene-divider';
                    divider.innerHTML = `<span>NEW SCENE DETECTED</span>`;
                    output.appendChild(divider);
                    return;
                }

                // Normal Message Rendering Logic (from our previous steps)
                const group = document.createElement('div');
                group.className = 'message-group';
                // ... (rest of your group.innerHTML logic) ...
                output.appendChild(group);
            });
        }
        function parseMarkdown(text) {
            if (!text) return "";
            return text
                .replace(/\*\*\*(.*?)\*\*\*/g, '<span class="st-gold">$1</span>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<i>$1</i>')
                .replace(/\|\|(.*?)\|\|/g, '<span class="spoiler">$1</span>') // Added spoilers
                .replace(/<:(.*?):(\d+)>/g, (match, name, id) => {
                    return `<img src="{{ '/Chapter_Logs/emojis/' | relative_url }}${name}_${id}.png" style="height:1.2em; vertical-align:middle;">`;
                });
        }

        function renderAttachments(attachments, folder) {
            if (!attachments || attachments.length === 0) return "";
            return attachments.map(a => 
                `<img src="{{ '/Chapter_Logs/media/' | relative_url }}${folder}/${a.fileName || a.filename}" class="attachment-img">`
            ).join('');
        }

        function parseMarkdown(text) {
            if (!text) return "";

            // 1. Escaping HTML to prevent code injection
            let html = text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");

            return html
                // --- BOLD / ITALIC COMBOS ---
                .replace(/\*\*\*(.*?)\*\*\*/g, '<span class="st-gold">$1</span>') // Storyteller Gold
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')               // Bold
                .replace(/\*(.*?)\*/g, '<i>$1</i>')                            // Italic
                .replace(/__(.*?)__/g, '<u>$1</u>')                            // Underline
                .replace(/~~(.*?)~~/g, '<del>$1</del>')                        // Strikethrough
                
                // --- CODE FORMATTING ---
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')    // Multi-line code
                .replace(/`(.*?)`/g, '<code>$1</code>')                        // Single-line code
                
                // --- DISCORD SPECIFICS ---
                .replace(/\|\|(.*?)\|\|/g, '<span class="spoiler">$1</span>')  // Spoilers
                .replace(/> (.*?)(\n|$)/g, '<blockquote>$1</blockquote>')     // Blockquotes
                
                // --- CUSTOM ASSETS ---
                .replace(/&lt;:(.*?):(\d+)&gt;/g, (match, name, id) => {       // Emojis (using escaped brackets)
                    return `<img src="{{ '/Chapter_Logs/emojis/' | relative_url }}${name}_${id}.png" class="emoji" alt="${name}">`;
                })
                
                // --- NEWLINES ---
                .replace(/\n/g, '<br>');                                       // Preserve line breaks
        }
    </script>
</body>
</html>
