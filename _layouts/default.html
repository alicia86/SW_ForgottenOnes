<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | SW: Forgotten Ones</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    
<style>
    :root {
        --sw-blue: #00aaff;
        --sw-yellow: #ffcc00;
        --border-color: #444;
        --text-main: #e0e0e0;
        --text-muted: #888;
    }

    body {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
        line-height: 1.6;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: #1a1a1a;
        color: var(--text-main);
    }

    /* --- THE MESSAGE CONTAINER --- */
    /* This ensures each new post (Avatar + Name) starts fresh */
    main hr + img, 
    main h1 + img,
    main p + img {
        clear: both;
        display: block;
        margin-top: 20px;
    }

    /* --- AVATAR ALIGNMENT --- */
    img[alt="avatar"] {
        float: left;
        border-radius: 4px;
        margin-right: 12px !important;
        margin-bottom: 0px; /* Removed bottom margin to align with text */
        border: 1px solid var(--border-color);
    }

    /* --- CHARACTER NAME & TIMESTAMP --- */
    /* Make the header stay on the same line as the floated image */
    main h2, main h3 {
        display: inline-block; 
        margin: 0;
        padding: 0;
        vertical-align: top;
        line-height: 1.2;
        color: var(--sw-blue); /* Accent color for name */
        font-size: 1.1rem;
    }

    /* Target the Timestamp inside the parentheses */
    /* This handles the "(01/20/2026...)" part */
    main h2 + em, 
    main h3 + em,
    main h3 {
        font-weight: 700;
    }

    /* Specific fix for the timestamp text formatting */
    main h3 {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    /* Re-formatting the timestamp to be smaller and default color */
    main h3 strong { color: var(--sw-blue); } /* Name in Blue */
    
    /* If the timestamp is inside the H3 but not bolded */
    main h3:contains("(") {
        color: var(--text-muted);
        font-size: 0.85rem;
        font-weight: normal;
    }

    /* --- DISCORD ID (The long numbers) --- */
    /* Since these are usually in an <a> or <em> tag right below the name */
    main a + em {
        display: block;
        clear: none;
        margin-left: 52px; /* Aligns it under the name, past the avatar */
        font-size: 0.75rem;
        color: #555;
        font-style: normal;
    }

    /* --- BODY TEXT --- */
    /* Ensures the actual dialogue starts under the name/ID, not wrapped under the avatar */
    main p {
        margin-left: 52px; /* Matches the avatar width + margin */
        margin-top: 5px;
        margin-bottom: 15px;
    }

    /* Bold Dialogue */
    main p strong {
        color: #fff;
    }

    /* --- STAR WARS INTRO --- */
    main p:first-of-type em strong em {
        color: var(--sw-yellow);
        display: block;
        margin-left: 0; /* Let the intro span the full width */
        margin-bottom: 20px;
    }

    /* --- DIVIDERS --- */
    hr {
        clear: both;
        border: 0;
        height: 1px;
        background: var(--border-color);
        margin: 20px 0;
    }
</style>


</head>
<body>

    <header>
        <nav>
            <a href="{{ site.baseurl }}/" class="back-link">← Back to Logs Index</a>
        </nav>
        <h1>{{ page.title }}</h1>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>Campaign: <strong>Star Wars: Forgotten Ones</strong></p>
        <p>Last updated: {{ "now" | date: "%Y-%m-%d" }}</p>
    </footer>

</body>
</html>
