<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | SW: Forgotten Ones</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    
<style>
    :root {
        --sw-blue: #00aaff;
        --sw-yellow: #ffcc00;
        --border-color: #444;
        --text-main: #e0e0e0;
        --text-muted: #888;
    }

    body {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
        line-height: 1.7;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: #1a1a1a;
        color: var(--text-main);
    }

    /* --- LAYOUT & CLEARFIX --- */
    /* This prevents text from wrapping awkwardly around the floating avatars */
    main h2, main h3, main hr {
        clear: both;
        padding-top: 10px;
    }

    /* --- AVATARS --- */
    img[alt="avatar"] {
        border-radius: 4px;
        border: 1px solid var(--border-color);
        margin-right: 15px !important;
        margin-bottom: 10px;
        box-shadow: 0 0 10px rgba(0, 170, 255, 0.1);
        /* Ensures the image doesn't shrink */
        min-width: 40px; 
    }

    /* --- HEADERS (Character Names) --- */
    h1 { border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
    h2, h3 { color: var(--sw-blue); margin-bottom: 5px; font-size: 1.25rem; }
    h4, h5 { color: var(--text-main); text-transform: uppercase; letter-spacing: 1px; }

    /* --- TEXT FORMATTING --- */
    /* Bold dialogue */
    main strong {
        color: #ffffff;
        font-weight: 700;
    }

    /* Regular Italics (Narration) */
    main em {
        font-style: italic;
        color: var(--text-main);
    }

    /* The Discord ID (Numbers) and Timestamps */
    /* Targets the italicized ID numbers specifically */
    main a + em {
        display: block;
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: -10px;
        margin-bottom: 15px;
        font-style: normal;
    }

    /* --- THE STAR WARS INTRO --- */
    /* Only targets the triple-italicized intro line if it's at the top */
    main p:first-of-type em strong em,
    main p:first-of-type strong em {
        color: var(--sw-yellow);
        font-style: italic;
        display: block;
        margin-bottom: 20px;
        font-size: 1.1rem;
    }

    /* --- DIVIDERS --- */
    hr {
        border: 0;
        height: 1px;
        background-image: linear-gradient(to right, transparent, var(--border-color), transparent);
        margin: 2.5rem 0;
    }

    /* --- NAVIGATION --- */
    .back-link {
        text-decoration: none;
        font-weight: bold;
        color: var(--sw-blue);
        display: inline-block;
        margin-bottom: 20px;
    }
    .back-link:hover {
        text-decoration: underline;
    }
</style

</head>
<body>

    <header>
        <nav>
            <a href="{{ site.baseurl }}/" class="back-link">← Back to Logs Index</a>
        </nav>
        <h1>{{ page.title }}</h1>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>Campaign: <strong>Star Wars: Forgotten Ones</strong></p>
        <p>Last updated: {{ "now" | date: "%Y-%m-%d" }}</p>
    </footer>

</body>
</html>
