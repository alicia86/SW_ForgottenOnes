<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | SW: Forgotten Ones</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    
<style>
    :root {
        --sw-blue: #00aaff;
        --border-color: #444;
    }
    body {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
        line-height: 1.6;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    
    /* Post Container - ensures avatars and text stay together */
    main p, main h2, main h3 {
        clear: both; /* Prevents text from overlapping floating images */
    }

    /* Avatar Styling */
    img[alt="avatar"] {
        border-radius: 4px;
        border: 1px solid var(--border-color);
        margin-right: 15px !important;
        margin-bottom: 10px;
        box-shadow: 0 0 10px rgba(0, 170, 255, 0.1);
    }

    /* Character Names */
    h2, h3 {
        color: var(--sw-blue);
        margin-bottom: 5px;
        font-size: 1.2rem;
    }

    /* Timestamps and IDs */
    em {
        font-size: 0.85rem;
        color: #888;
        font-style: normal;
    }

    /* The "Star Wars" Intro Text (Italics) */
    main p em {
        color: #ffcc00; /* Classic Star Wars Yellow */
        display: block;
        padding: 10px 0;
    }

    /* Dividers */
    hr {
        border: 0;
        height: 1px;
        background-image: linear-gradient(to right, transparent, var(--border-color), transparent);
        margin: 2rem 0;
    }

    /* Blockquotes for IC/OOC separation */
    blockquote {
        border-left: 3px solid var(--sw-blue);
        background: rgba(0, 170, 255, 0.05);
        padding: 1px 20px;
        margin: 10px 0;
    }
</style>

</head>
<body>

    <header>
        <nav>
            <a href="{{ site.baseurl }}/" class="back-link">← Back to Logs Index</a>
        </nav>
        <h1>{{ page.title }}</h1>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>Campaign: <strong>Star Wars: Forgotten Ones</strong></p>
        <p>Last updated: {{ "now" | date: "%Y-%m-%d" }}</p>
    </footer>

</body>
</html>
