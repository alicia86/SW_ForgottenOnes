title: "Star Wars: Forgotten Ones"
description: "A Star Wars Sage TTRPG Campaign"
url: "https://fo.galacticcampaigns.com"
baseurl: "" # Leave empty if using a custom domain, or set to /repo-name/

# Force Jekyll to include these folders
include:
  - Chapter_Logs
  - Image_Resources
  - assets

# This prevents Jekyll from ignoring files it doesn't recognize
keep_files:
  - Chapter_Logs
  - Image_Resources
  - CNAME
  - assets

# Collections for the future JSON rendering
collections:
  chapters:
    output: true
    directory: Chapter_Logs/JSON

# Markdown settings
markdown: kramdown
highlighter: rouge
