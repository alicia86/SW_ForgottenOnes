name: Notify Galactic Campaigns
on:
  push:
    branches:
      - main
    paths:
      - 'Chapter_Logs/JSON/*.json' # Only fire if logs actually changed  
  workflow_dispatch:
jobs:
  ping-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Send Repository Dispatch
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.ENGINE_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/GalacticCampaigns/website/dispatches \
            -d '{"event_type": "update-logs"}'

