name: Update Log Manifest
on:
  push:
    branches:
      - website  # Triggers when JSONs are pushed to website
    paths:
      - 'Chapter_Logs/JSON/*.json'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force re-scan of all titles'
        required: false
        type: boolean
        default: false

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Website Branch
        uses: actions/checkout@v4
        with:
          ref: website # CRITICAL: This tells the action to ignore 'main' and work on 'website'

      - name: Run Manifest Generator
        shell: pwsh
        run: |
          $force = "${{ github.event.inputs.force_refresh }}" -eq "true"
          # Path must match where the script is on the website branch
          if ($force) {
            ./.github/workflows/scripts/manifest-gen.ps1 -ForceUpdate
          } else {
            ./.github/workflows/scripts/manifest-gen.ps1
          }

      - name: Commit and Push to Website
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"          
          git add assets/log-manifest.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update log manifest [skip ci]" && git push origin website)
