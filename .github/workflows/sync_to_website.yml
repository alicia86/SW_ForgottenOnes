name: Sync Data to Website Branch

on:
  push:
    branches:
      - main
    paths:
      - 'Chapter_Logs/**'
      - 'Image_Resources/**'
  workflow_dispatch:

# Opt into Node.js 24 to clear the deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Branch
        uses: actions/checkout@v4
        with:
          path: main_repo

      - name: Checkout Website Branch
        uses: actions/checkout@v4
        with:
          ref: website
          path: website_repo

      - name: Sync Content and Resources
        run: |
          mkdir -p website_repo/Chapter_Logs
          mkdir -p website_repo/Image_Resources
          mkdir -p website_repo/assets/internal

          # Sync folders
          rsync -av --delete main_repo/Chapter_Logs/ website_repo/Chapter_Logs/
          rsync -av --delete main_repo/Image_Resources/ website_repo/Image_Resources/

      - name: Inject Markdown Headers and Standardize Content
        run: |
          find website_repo/Chapter_Logs -maxdepth 1 -name "*.md" | while read file; do
            filename=$(basename "$file" .md)
            
            # 1. CLEANUP: Strip leading whitespace and fix potential BOM/Encoding issues
            # We use sed to remove the BOM if it exists (the 1s/...) and leading spaces on # lines
            sed -i '1s/^\xEF\xBB\xBF//' "$file"
            sed -i 's/^[[:space:]]*#/#/g' "$file"

            # 2. GENERATE CLEAN METADATA
            if [[ "$filename" == *"Prelude"* ]]; then
              ORDER=0
              RAW_NAME=$(echo "$filename" | sed 's/FO_BB_Prelude-//')
              CLEAN_NAME=$(echo "$RAW_NAME" | sed 's/[-_]/ /g' | perl -pe 's/\b(\w)/\U$1/g')
              TITLE="Prelude: $CLEAN_NAME"
            else
              ORDER=$(echo "$filename" | grep -oP '(?<=Ch)\d+' || echo "99")
              RAW_NAME=$(echo "$filename" | sed -E 's/FO_Ch[0-9]+[-_]?//')
              CLEAN_NAME=$(echo "$RAW_NAME" | sed 's/[-_]/ /g' | perl -pe 's/\b(\w)/\U$1/g')
              TITLE="Chapter $ORDER: $CLEAN_NAME"
            fi

            # 3. STANDARDIZE THE H1
            # Logic: If the file ALREADY has a single '#' header, replace it. 
            # If it only has '##' or higher (like Preludes), prepend the H1 at the very top of content.
            if grep -q "^#[[:space:]]" "$file"; then
                # Replace the existing H1
                sed -i "0,/^#[[:space:]].*/s/^#[[:space:]].*/# $TITLE/" "$file"
            else
                # Prepend the H1 if only subheaders exist
                sed -i "1i # $TITLE\n" "$file"
            fi

            # 4. FIX SUB-HEADER SPACING (##Title -> ## Title)
            sed -i 's/^\(#\+\)\([^#[:space:]]\)/\1 \2/g' "$file"

            # 5. INJECT FRONT MATTER
            if ! head -n 5 "$file" | grep -q "layout:"; then
              {
                echo "---"
                echo "layout: log-entry"
                echo "title: \"$TITLE\""
                echo "order: $ORDER"
                echo "---"
                echo ""
                cat "$file"
              } > "$file.tmp" && mv "$file.tmp" "$file"
              echo "✅ Standardized: $TITLE"
            else
              echo "⏭️ Cleaned: $filename"
            fi
          done
      - name: Commit and Push
        run: |
          cd website_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-sync: Processed logs with Node 24 and Headers"
            git push origin website
          else
            echo "No changes detected."
          fi
