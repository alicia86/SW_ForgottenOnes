name: Sync Data to Website Branch

on:
  push:
    branches:
      - main
    paths:
      - 'Chapter_Logs/**'
      - 'Image_Resources/**'

jobs:
  sync-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main_repo

      - name: Checkout Website Branch
        uses: actions/checkout@v4
        with:
          ref: website
          path: website_repo

      - name: Sync Content and Resources
        run: |
          # Create folders on website branch if missing
          mkdir -p website_repo/Chapter_Logs
          mkdir -p website_repo/Image_Resources
          mkdir -p website_repo/assets/internal

          # Sync Chapter Logs (JSON, avatars, emojis, media)
          rsync -av --delete main_repo/Chapter_Logs/ website_repo/Chapter_Logs/
          
          # Sync PC/NPC Resources
          rsync -av --delete main_repo/Image_Resources/ website_repo/Image_Resources/
          
      - name: Inject Markdown Headers with Order
        run: |
          cd website_repo/Chapter_Logs
          for file in *.md; do
            [ -e "$file" ] || continue
            
            # 1. Determine the Order Number
            if [[ "$file" == *"Prelude"* ]]; then
              ORDER=0
            else
              # Extracts number from "FO_Ch1", "FO_Ch12", etc.
              ORDER=$(echo "$file" | grep -oP '(?<=Ch)\d+')
            fi

            # 2. Generate Title
            TITLE=$(echo "$file" | sed 's/\.md//' | sed 's/FO_Ch/Chapter /' | sed 's/FO_BB_Prelude-/Prelude: /' | sed 's/[-_]/ /g')

            # 3. Inject Front Matter (Only if not already present)
            if ! grep -q "^---" "$file"; then
              echo -e "---\nlayout: default\ntitle: \"$TITLE\"\norder: $ORDER\n---\n\n$(cat "$file")" > "$file"
            fi
          done

      - name: Commit and Push to Website Branch
        run: |
          cd website_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # Check for changes to avoid empty commits
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-sync: Updated chapter logs and resources from main"
            git push origin website
          else
            echo "No changes to sync."
          fi
