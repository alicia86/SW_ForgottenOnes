name: Sync Data to Website Branch

on:
  push:
    branches:
      - main
    paths:
      - 'Chapter_Logs/**'
      - 'Image_Resources/**'

# Opt into Node.js 24 to clear the deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Branch
        uses: actions/checkout@v4
        with:
          path: main_repo

      - name: Checkout Website Branch
        uses: actions/checkout@v4
        with:
          ref: website
          path: website_repo

      - name: Sync Content and Resources
        run: |
          mkdir -p website_repo/Chapter_Logs
          mkdir -p website_repo/Image_Resources
          mkdir -p website_repo/assets/internal

          # Sync folders
          rsync -av --delete main_repo/Chapter_Logs/ website_repo/Chapter_Logs/
          rsync -av --delete main_repo/Image_Resources/ website_repo/Image_Resources/

      - name: Inject Markdown Headers
        run: |
          # Find all .md files, excluding the JSON folder if it's inside
          find website_repo/Chapter_Logs -maxdepth 1 -name "*.md" | while read file; do
            filename=$(basename "$file")
            
            # 1. Check if header already exists (checks first line for ---)
            if ! head -n 1 "$file" | grep -q "^---"; then
              
              # 2. Determine Order
              if [[ "$filename" == *"Prelude"* ]]; then
                ORDER=0
              else
                # Extracts the digits after 'Ch'
                ORDER=$(echo "$filename" | grep -oP '(?<=Ch)\d+' || echo "99")
              fi

              # 3. Clean Title (FO_Ch1_Awakening -> Chapter 1: Awakening)
              TITLE=$(echo "$filename" | sed 's/\.md//' | sed 's/FO_Ch/Chapter /' | sed 's/FO_BB_Prelude-/Prelude: /' | sed 's/[-_]/ /g')

              # 4. Inject using a temporary file for safety
              {
                echo "---"
                echo "layout: default"
                echo "title: \"$TITLE\""
                echo "order: $ORDER"
                echo "---"
                echo ""
                cat "$file"
              } > "$file.tmp" && mv "$file.tmp" "$file"
              
              echo "✅ Injected header into $filename (Order: $ORDER)"
            else
              echo "⏭️ Skipping $filename (Header exists)"
            fi
          done

      - name: Commit and Push
        run: |
          cd website_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-sync: Processed logs with Node 24 and Headers"
            git push origin website
          else
            echo "No changes detected."
          fi
